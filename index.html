<!DOCTYPE html>
<html lang=\"id\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">

<title>Aplikasi Voucher</title>

<script src=\"https://cdn.tailwindcss.com\"></script>

<script src=\"https://cdn.jsdelivr.net/npm/sweetalert2@11\"></script>

</head>

<body class=\"bg-slate-100\">

<div class=\"min-h-screen flex items-center justify-center\">

<div class=\"bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md\">

<h1 class=\"text-3xl font-bold text-center mb-6\">
Login Aplikasi Voucher
</h1>

<input
id=\"username\"
type=\"text\"
placeholder=\"Username\"
class=\"w-full border p-3 rounded-xl mb-4\"
/>

<input
id=\"password\"
type=\"password\"
placeholder=\"Password\"
class=\"w-full border p-3 rounded-xl mb-4\"
/>

<button
onclick=\"login()\"
class=\"w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl\"
>
Login
</button>

</div>

</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbyp4dCjStaX1lJySeVXdlaMSGgCB4LaVuynZQCVQJn1rUPrG5onBmHE8j1teENeCoxa/exec'

async function login() {

  const username = document.getElementById('username').value
  const password = document.getElementById('password').value

  const response = await fetch(API_URL, {

    method: 'POST',

    body: JSON.stringify({
      action: 'login',
      username,
      password
    })

  })

  const result = await response.json()

  if (result.status) {

    Swal.fire({
      icon: 'success',
      title: 'Login Berhasil',
      timer: 1500,
      showConfirmButton: false
    })

    if (result.role == 'Admin') {

      setTimeout(() => {
        window.location.href = 'admin.html'
      }, 1500)

    } else {

      setTimeout(() => {
        window.location.href = 'user.html'
      }, 1500)

    }

  } else {

    Swal.fire({
      icon: 'error',
      title: 'Login Gagal'
    })

  }

}

</script>

</body>
</html>
